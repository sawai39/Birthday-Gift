<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐，我的宝贝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 主页面样式 */
        .main-container {
            max-width: 430px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            position: relative;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 30px 0;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        /* 卡片容器 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        /* 卡片样式 */
        .gift-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            background-color: #fff;
            border: 2px solid #ffb6c1;
        }
        
        .gift-card:hover {
            transform: translateY(-5px);
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 卡片内容 */
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }
        
        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        
        /* 刮刮乐效果 */
        .scratch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0.9;
            transition: opacity 0.5s ease;
        }
        
        /* 网格图案覆盖层 */
        .scratch-overlay.grid {
            background: linear-gradient(45deg, #ffb6c1 25%, #ffc0cb 25%, #ffc0cb 50%, #ffb6c1 50%, #ffb6c1 75%, #ffc0cb 75%, #ffc0cb 100%);
            background-size: 28.28px 28.28px;
            animation: scratchPattern 3s linear infinite;
        }
        
        /* 粉色波点覆盖层 */
        .scratch-overlay.polka {
            background-image: radial-gradient(#ff69b4 2px, transparent 2px);
            background-size: 20px 20px;
            background-color: #ffb6c1;
            animation: polkaPattern 4s linear infinite;
        }
        
        /* 彩虹渐变覆盖层 */
        .scratch-overlay.rainbow {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #ff9ff3, #feca57, #ff6b6b);
            background-size: 400% 400%;
            animation: rainbowGradient 8s ease infinite;
        }
        
        /* 动画效果 */
        @keyframes scratchPattern {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 28.28px 28.28px;
            }
        }
        
        @keyframes polkaPattern {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 20px 20px;
            }
        }
        
        @keyframes rainbowGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        

        
        .scratch-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: pointer;
        }
        
        /* 详情页样式 */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .detail-content {
            max-width: 430px;
            margin: 0 auto;
            padding: 40px 20px;
            color: white;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }
        
        .detail-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .detail-description {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        /* 视频页面样式 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin: 20px 0;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        
        /* 密码输入样式 */
        .password-container {
            text-align: center;
            margin: 50px 0;
        }
        
        .password-input {
            padding: 10px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .password-btn {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* 爱情quiz样式 */
        .quiz-container {
            margin: 30px 0;
        }
        
        .quiz-question {
            margin-bottom: 20px;
        }
        
        .quiz-options {
            margin: 10px 0;
        }
        
        .quiz-option {
            display: block;
            margin: 5px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
        }
        
        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .quiz-submit {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* 爱心动画 */
        .heart {
            position: fixed;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            transform: rotate(45deg);
            z-index: 9999;
            pointer-events: none;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -10px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 430px) {
            .main-container {
                max-width: 100%;
                padding: 10px;
            }
            
            .cards-container {
                gap: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 主页面 -->
    <div class="main-container">
        <h1>生日快乐，我的宝贝</h1>
        <p class="subtitle">每一份礼物都是我对你的爱与牵挂</p>
        
        <div class="cards-container">
            <!-- 生日蛋糕卡片 - 网格图案 -->
            <div class="gift-card" data-id="cake">
                <div class="card-content">
                    <div class="card-icon">🎂</div>
                    <div class="card-title">生日蛋糕</div>
                </div>
                <div class="scratch-overlay grid"></div>
                <div class="scratch-area"></div>
            </div>
            
            <!-- lululemon瑜伽裤卡片 - 粉色波点 -->
            <div class="gift-card" data-id="yoga">
                <div class="card-content">
                    <div class="card-icon">🧘‍♀️</div>
                    <div class="card-title">瑜伽裤</div>
                </div>
                <div class="scratch-overlay polka"></div>
                <div class="scratch-area"></div>
            </div>
            
            <!-- 防晒口罩卡片 - 彩虹渐变 -->
            <div class="gift-card" data-id="mask">
                <div class="card-content">
                    <div class="card-icon">😷</div>
                    <div class="card-title">防晒口罩</div>
                </div>
                <div class="scratch-overlay rainbow"></div>
                <div class="scratch-area"></div>
            </div>
            
            <!-- 高跟鞋卡片 - 网格图案 -->
            <div class="gift-card" data-id="heels">
                <div class="card-content">
                    <div class="card-icon">👠</div>
                    <div class="card-title">高跟鞋</div>
                </div>
                <div class="scratch-overlay grid"></div>
                <div class="scratch-area"></div>
            </div>
            
            <!-- 视频卡片 - 粉色波点 -->
            <div class="gift-card" data-id="video">
                <div class="card-content">
                    <div class="card-icon">🎥</div>
                    <div class="card-title">专属视频</div>
                </div>
                <div class="scratch-overlay polka"></div>
                <div class="scratch-area"></div>
            </div>
            
            <!-- 爱情quiz卡片 - 彩虹渐变 -->
            <div class="gift-card" data-id="quiz">
                <div class="card-content">
                    <div class="card-icon">💖</div>
                    <div class="card-title">爱情Quiz</div>
                </div>
                <div class="scratch-overlay rainbow"></div>
                <div class="scratch-area"></div>
            </div>
        </div>
    </div>
    
    <!-- 详情页 -->
    <div class="detail-page" id="detailPage">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <div class="detail-content" id="detailContent">
            <!-- 内容将通过JavaScript动态填充 -->
        </div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop autoplay>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // 礼物数据
        const gifts = {
            cake: {
                title: "甜蜜生日蛋糕",
                description: "为你定制的专属生日蛋糕，希望它能像我们的爱情一样甜蜜。每一口都充满我的心意，愿你的每一天都如蛋糕般美好。",
                image: "https://picsum.photos/seed/cake/800/600"
            },
            yoga: {
                title: "Lululemon瑜伽裤",
                description: "知道你喜欢运动，特意为你挑选了这条Lululemon瑜伽裤。它不仅舒适透气，更能展现你优美的曲线。希望你在运动时能感受到我的陪伴。",
                image: "https://picsum.photos/seed/yoga/800/600"
            },
            mask: {
                title: "防晒口罩",
                description: "夏天快到了，为你准备了这款防晒口罩，保护你娇嫩的肌肤免受紫外线伤害。就像我一直想保护你一样，让你在阳光下也能自信美丽。",
                image: "https://picsum.photos/seed/mask/800/600"
            },
            heels: {
                title: "优雅高跟鞋",
                description: "这双高跟鞋能让你更加优雅动人，就像你在我心中的样子。每一步都踩在我的心上，愿你穿着它走向更加美好的未来。",
                image: "https://picsum.photos/seed/heels/800/600"
            },
            video: {
                title: "专属视频",
                description: "这是我为你精心制作的视频，记录了我们在一起的美好时光。每一个画面都承载着我对你的爱，希望你能感受到我的用心。",
                isVideo: true,
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            quiz: {
                title: "爱情Quiz",
                description: "来测试一下我们的默契吧！看看你对我了解多少，每一个问题都藏着我对你的爱。",
                isQuiz: true
            }
        };
        
        // 刮刮乐效果
        document.querySelectorAll('.scratch-area').forEach(area => {
            let isScratching = false;
            let scratchedArea = 0;
            const overlay = area.parentElement.querySelector('.scratch-overlay');
            const card = area.parentElement;
            const rect = overlay.getBoundingClientRect();
            const cardArea = rect.width * rect.height;
            const requiredScratchPercentage = 1.0; // 需要刮开100%的面积
            const requiredScratchArea = cardArea * requiredScratchPercentage;
            
            // 鼠标事件
            area.addEventListener('mousedown', function(e) {
                isScratching = true;
                scratch(e);
            });
            
            document.addEventListener('mousemove', function(e) {
                if (isScratching) {
                    scratch(e);
                }
            });
            
            document.addEventListener('mouseup', function() {
                isScratching = false;
            });
            
            // 触摸事件
            area.addEventListener('touchstart', function(e) {
                isScratching = true;
                scratch(e.touches[0]);
            });
            
            area.addEventListener('touchmove', function(e) {
                if (isScratching) {
                    e.preventDefault();
                    scratch(e.touches[0]);
                }
            }, { passive: false });
            
            area.addEventListener('touchend', function() {
                isScratching = false;
            });
            
            function scratch(e) {
                const rect = overlay.getBoundingClientRect();
                const x = e.clientX;
                const y = e.clientY;
                
                // 计算相对于overlay的位置
                const relativeX = x - rect.left;
                const relativeY = y - rect.top;
                
                // 创建刮开效果
                const circle = document.createElement('div');
                circle.style.position = 'absolute';
                circle.style.width = '60px';
                circle.style.height = '60px';
                circle.style.borderRadius = '50%';
                circle.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
                circle.style.left = (relativeX - 30) + 'px';
                circle.style.top = (relativeY - 30) + 'px';
                circle.style.pointerEvents = 'none';
                circle.style.zIndex = '15';
                
                overlay.appendChild(circle);
                
                // 计算刮开的面积（简化计算：每个刮开区域按圆形面积计算）
                const scratchCircleArea = Math.PI * Math.pow(30, 2); // 半径30px的圆面积
                scratchedArea += scratchCircleArea;
                
                // 检查是否刮开了足够的面积
                checkScratchProgress();
            }
            
            function checkScratchProgress() {
                if (scratchedArea >= requiredScratchArea) {
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 300); // 缩短时间，让覆盖层更快消失
                }
            }
        });
        
        // 卡片点击事件
        document.querySelectorAll('.gift-card').forEach(card => {
            card.addEventListener('click', function() {
                const overlay = this.querySelector('.scratch-overlay');
                // 只有当刮开覆盖层后才能点击进入详情
                if (overlay && overlay.style.display !== 'none') {
                    return; // 刮开覆盖层之前不允许点击
                }
                
                const giftId = this.dataset.id;
                if (giftId === 'video') {
                    // 视频需要密码
                    showPasswordPrompt();
                } else {
                    showDetail(giftId);
                }
            });
        });
        
        // 显示详情页
        function showDetail(giftId) {
            const gift = gifts[giftId];
            const detailContent = document.getElementById('detailContent');
            
            let content = '';
            if (gift.isVideo) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <div class="video-container">
                        <iframe src="${gift.videoUrl}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <p class="detail-description">${gift.description}</p>
                `;
            } else if (gift.isQuiz) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <p class="detail-description">${gift.description}</p>
                    <div class="quiz-container">
                        <div class="quiz-question">
                            <h3>1. 我最喜欢的颜色是什么？</h3>
                            <div class="quiz-options">
                                <div class="quiz-option" data-correct="true">粉色</div>
                                <div class="quiz-option">蓝色</div>
                                <div class="quiz-option">绿色</div>
                                <div class="quiz-option">紫色</div>
                            </div>
                        </div>
                        <div class="quiz-question">
                            <h3>2. 我们第一次见面的地方是？</h3>
                            <div class="quiz-options">
                                <div class="quiz-option">咖啡店</div>
                                <div class="quiz-option" data-correct="true">图书馆</div>
                                <div class="quiz-option">公园</div>
                                <div class="quiz-option">电影院</div>
                            </div>
                        </div>
                        <div class="quiz-question">
                            <h3>3. 我最爱的食物是？</h3>
                            <div class="quiz-options">
                                <div class="quiz-option">火锅</div>
                                <div class="quiz-option">寿司</div>
                                <div class="quiz-option" data-correct="true">意大利面</div>
                                <div class="quiz-option">烧烤</div>
                            </div>
                        </div>
                        <button class="quiz-submit" onclick="submitQuiz()">提交答案</button>
                        <div id="quizResult" style="margin-top: 20px;"></div>
                    </div>
                `;
            } else {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <img src="${gift.image}" alt="${gift.title}" class="detail-image">
                    <p class="detail-description">${gift.description}</p>
                `;
            }
            
            detailContent.innerHTML = content;
            document.getElementById('detailPage').style.display = 'block';
        }
        
        // 关闭详情页
        function closeDetail() {
            document.getElementById('detailPage').style.display = 'none';
        }
        
        // 显示密码提示
        function showPasswordPrompt() {
            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <h2 class="detail-title">输入密码查看视频</h2>
                <div class="password-container">
                    <input type="password" class="password-input" id="passwordInput" placeholder="请输入密码">
                    <br>
                    <button class="password-btn" onclick="checkPassword()">确定</button>
                    <p id="passwordError" style="color: red; margin-top: 10px;"></p>
                </div>
            `;
            document.getElementById('detailPage').style.display = 'block';
        }
        
        // 检查密码
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === '123456') {
                showDetail('video');
            } else {
                document.getElementById('passwordError').textContent = '密码错误，请重试';
            }
        }
        
        // 提交quiz
        function submitQuiz() {
            let score = 0;
            const options = document.querySelectorAll('.quiz-option');
            
            options.forEach(option => {
                if (option.classList.contains('selected') && option.dataset.correct === 'true') {
                    score++;
                }
            });
            
            const result = document.getElementById('quizResult');
            result.innerHTML = `你的得分是：${score}/3！${score === 3 ? '太棒了，你是最了解我的人！' : '继续加油，我们还有更多时间去了解彼此。'}`;
        }
        
        // 选择quiz选项
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('quiz-option')) {
                const options = e.target.parentElement.querySelectorAll('.quiz-option');
                options.forEach(opt => opt.classList.remove('selected'));
                e.target.classList.add('selected');
            }
        });
        
        // 爱心动画
        document.addEventListener('click', function(e) {
            createHeart(e.clientX, e.clientY);
        });
        
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            
            // 动画
            heart.style.animation = 'heartFloat 3s ease-out forwards';
            
            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes heartFloat {
                0% {
                    transform: rotate(45deg) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: rotate(45deg) scale(0.5) translateY(-100px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // 自动播放音乐
        window.addEventListener('load', function() {
            const music = document.getElementById('bgMusic');
            music.volume = 0.3;
            // 尝试播放音乐
            music.play().catch(e => {
                console.log('需要用户交互才能播放音乐');
            });
        });
        
        // 点击页面时播放音乐
        document.addEventListener('click', function() {
            const music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play();
            }
        });
    </script>
</body>
</html>
