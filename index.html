<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐，我的宝贝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f9f5e9 0%, #e8f5e8 100%);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(144, 238, 144, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 192, 203, 0.1) 0%, transparent 50%);
        }

        /* 主页面样式 */
        .main-container {
            max-width: 430px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(180deg, #fff5f5 0%, #fff0f5 50%, #f0fff0 100%);
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .birthday-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .candle {
            position: absolute;
            width: 8px;
            height: 30px;
            background: linear-gradient(180deg, #ffe4b5 0%, #deb887 100%);
            border-radius: 2px;
        }

        .candle::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: radial-gradient(ellipse at bottom, #ff6b35 0%, #ff8c00 40%, #ffd700 70%, transparent 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.1, 0.9) rotate(1deg); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(0.95, 1.05) rotate(-1deg); opacity: 1; }
        }

        .candle:nth-child(1) { top: 15%; left: 10%; }
        .candle:nth-child(2) { top: 25%; right: 15%; }
        .candle:nth-child(3) { top: 45%; left: 5%; }
        .candle:nth-child(4) { top: 55%; right: 8%; }

        .bell {
            position: absolute;
            font-size: 20px;
            animation: swing 1s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
        }

        .bell:nth-child(5) { top: 20%; left: 20%; animation-delay: 0.1s; }
        .bell:nth-child(6) { top: 35%; right: 10%; animation-delay: 0.3s; }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0.6;
        }

        .confetti:nth-child(7) {
            top: 10%;
            left: 30%;
            background: #ff6b6b;
            animation: fall 3s linear infinite;
        }

        .confetti:nth-child(8) {
            top: 15%;
            right: 25%;
            background: #ffd700;
            border-radius: 50%;
            animation: fall 4s linear infinite;
            animation-delay: 0.5s;
        }

        .confetti:nth-child(9) {
            top: 30%;
            left: 15%;
            background: #ff69b4;
            animation: fall 3.5s linear infinite;
            animation-delay: 1s;
        }

        .confetti:nth-child(10) {
            top: 40%;
            right: 20%;
            background: #98fb98;
            border-radius: 50%;
            animation: fall 4.5s linear infinite;
            animation-delay: 1.5s;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }

        .star {
            position: absolute;
            font-size: 16px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .star:nth-child(11) { top: 12%; right: 30%; animation-delay: 0.2s; }
        .star:nth-child(12) { top: 50%; left: 8%; animation-delay: 0.7s; }
        .star:nth-child(13) { top: 60%; right: 15%; animation-delay: 1.2s; }

        .balloon {
            position: absolute;
            font-size: 28px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .balloon:nth-child(14) { bottom: 8%; left: 10%; animation-delay: 0s; }
        .balloon:nth-child(15) { bottom: 15%; right: 12%; animation-delay: 0.5s; }
        .balloon:nth-child(16) { bottom: 5%; left: 35%; animation-delay: 1s; }

        .heart {
            position: absolute;
            font-size: 14px;
            color: #ff6b6b;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .heart:nth-child(17) { bottom: 25%; left: 15%; animation-delay: 0.2s; }
        .heart:nth-child(18) { bottom: 30%; right: 20%; animation-delay: 0.6s; }
        .heart:nth-child(19) { bottom: 18%; left: 50%; animation-delay: 1s; }
        .heart:nth-child(20) { bottom: 12%; right: 35%; animation-delay: 1.4s; }

        .gift-box {
            position: absolute;
            font-size: 22px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gift-box:nth-child(21) { bottom: 3%; right: 25%; animation-delay: 0.3s; }
        .gift-box:nth-child(22) { bottom: 10%; left: 20%; animation-delay: 0.8s; }

        .party-hat {
            position: absolute;
            font-size: 18px;
            animation: wiggle 2s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .party-hat:nth-child(23) { bottom: 35%; left: 25%; animation-delay: 0.4s; }
        .party-hat:nth-child(24) { bottom: 28%; right: 30%; animation-delay: 0.9s; }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: firework-burst 2s ease-out infinite;
        }

        .firework::before,
        .firework::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        @keyframes firework-burst {
            0% {
                transform: scale(0);
                opacity: 1;
                box-shadow:
                    0 0 #ff6b6b, 10px 0 #ff6b6b, -10px 0 #ff6b6b,
                    0 10px #ff6b6b, 0 -10px #ff6b6b,
                    7px 7px #ffd700, -7px -7px #ffd700,
                    7px -7px #ffd700, -7px 7px #ffd700;
            }
            50% {
                transform: scale(1);
                opacity: 1;
                box-shadow:
                    0 0 #ff6b6b, 20px 0 #ff6b6b, -20px 0 #ff6b6b,
                    0 20px #ff6b6b, 0 -20px #ff6b6b,
                    14px 14px #ffd700, -14px -14px #ffd700,
                    14px -14px #ffd700, -14px 14px #ffd700;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
                box-shadow:
                    0 0 transparent, 30px 0 transparent, -30px 0 transparent,
                    0 30px transparent, 0 -30px transparent,
                    21px 21px transparent, -21px -21px transparent,
                    21px -21px transparent, -21px 21px transparent;
            }
        }

        .firework:nth-child(25) { top: 8%; left: 20%; animation-delay: 0s; background: #ff6b6b; }
        .firework:nth-child(26) { top: 12%; right: 25%; animation-delay: 0.6s; background: #ffd700; }
        .firework:nth-child(27) { top: 18%; left: 45%; animation-delay: 1.2s; background: #ff69b4; }
        .firework:nth-child(28) { top: 5%; right: 40%; animation-delay: 0.3s; background: #00ff00; }
        .firework:nth-child(29) { top: 22%; left: 8%; animation-delay: 0.9s; background: #00bfff; }
        .firework:nth-child(30) { top: 15%; right: 12%; animation-delay: 1.5s; background: #ff6b6b; }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: sparkle-shine 1.5s ease-in-out infinite;
        }

        @keyframes sparkle-shine {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .sparkle:nth-child(31) { top: 10%; left: 25%; animation-delay: 0.1s; }
        .sparkle:nth-child(32) { top: 20%; right: 30%; animation-delay: 0.4s; }
        .sparkle:nth-child(33) { top: 8%; left: 60%; animation-delay: 0.7s; }
        .sparkle:nth-child(34) { top: 25%; left: 40%; animation-delay: 1s; }
        .sparkle:nth-child(35) { top: 18%; right: 50%; animation-delay: 1.3s; }
        .sparkle:nth-child(36) { top: 30%; left: 15%; animation-delay: 0.2s; }
        .sparkle:nth-child(37) { top: 35%; right: 25%; animation-delay: 0.5s; }
        .sparkle:nth-child(38) { top: 28%; left: 55%; animation-delay: 0.8s; }

        .main-container > *:not(.birthday-bg) {
            position: relative;
            z-index: 1;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 30px 0;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        /* 卡片容器 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        /* 卡片样式 */
        .gift-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            background-color: #fff;
            border: 2px solid #ffb6c1;
        }
        
        .gift-card:hover {
            transform: translateY(-5px);
        }

        /* 特殊礼物卡片样式 - 初始状态 */
        .gift-card.special-gift {
            border: 2px solid #ddd;
            transition: all 0.5s ease;
        }

        /* 刮开后的金色光晕效果 */
        .gift-card.special-gift.scratched {
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: specialGlow 2s ease-in-out infinite;
        }

        @keyframes specialGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.5);
            }
        }

        .special-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 5;
        }

        .gift-card.special-gift.scratched .special-badge {
            opacity: 1;
            animation: badgeBounce 1s ease-in-out infinite;
        }

        @keyframes badgeBounce {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }

        /* 特殊礼物模态框效果 */
        .gift-card.special-gift.modal-active {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 90%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1/1;
            z-index: 2000;
            animation: modalExpand 0.6s ease-out forwards;
        }

        @keyframes modalExpand {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* 模态框遮罩层 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: block;
            opacity: 1;
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 卡片内容 */
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }
        
        .card-icon {
            font-size: 70px;
            line-height: 1;
        }
        

        
        /* 刮刮乐效果 */
        .scratch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
            background-size: cover;
            background-position: center;
            background-color: #fff;
        }

        /* 自定义狗狗覆盖层 */
        .scratch-overlay.card1 {
            background-image: url('images/Card Cover/1074137029872582679~tplv-be4g95zd3a-image.jpeg');
        }

        .scratch-overlay.card2 {
            background-image: url('images/Card Cover/1721427659778686997~tplv-be4g95zd3a-image.jpeg');
        }

        .scratch-overlay.card3 {
            background-image: url('images/Card Cover/2aaf4ccc4c0dff3f1ca4dad74bcd30a3~tplv-be4g95zd3a-image.jpeg');
        }

        .scratch-overlay.card4 {
            background-image: url('images/Card Cover/2e49e2acd0df416356580b0864278e02~tplv-be4g95zd3a-image.jpeg');
        }

        .scratch-overlay.card5 {
            background-image: url('images/Card Cover/936717592625545275~tplv-be4g95zd3a-image.jpeg');
        }

        .scratch-overlay.card6 {
            background-image: url('images/Card Cover/949624132555505673~tplv-be4g95zd3a-image.jpeg');
        }

        /* 网格图案覆盖层 */
        .scratch-overlay.grid {
            background: linear-gradient(45deg, #ffb6c1 25%, #ffc0cb 25%, #ffc0cb 50%, #ffb6c1 50%, #ffb6c1 75%, #ffc0cb 75%, #ffc0cb 100%);
            background-size: 28.28px 28.28px;
            animation: scratchPattern 3s linear infinite;
        }
        
        /* 粉色波点覆盖层 */
        .scratch-overlay.polka {
            background-image: radial-gradient(#ff69b4 2px, transparent 2px);
            background-size: 20px 20px;
            background-color: #ffb6c1;
            animation: polkaPattern 4s linear infinite;
        }
        
        /* 彩虹渐变覆盖层 */
        .scratch-overlay.rainbow {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #ff9ff3, #feca57, #ff6b6b);
            background-size: 400% 400%;
            animation: rainbowGradient 8s ease infinite;
        }
        
        /* 动画效果 */
        @keyframes scratchPattern {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 28.28px 28.28px;
            }
        }
        
        @keyframes polkaPattern {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 20px 20px;
            }
        }
        
        @keyframes rainbowGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        

        
        .scratch-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: pointer;
        }
        
        /* 详情页样式 */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .detail-content {
            max-width: 430px;
            margin: 0 auto;
            padding: 40px 20px;
            color: white;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }
        
        .detail-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .detail-description {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        /* 视频页面样式 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin: 20px 0;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        
        /* 密码输入样式 */
        .password-container {
            text-align: center;
            margin: 50px 0;
        }
        
        .password-input {
            padding: 10px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .password-btn {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* 爱情quiz样式 */
        .quiz-container {
            margin: 30px 0;
        }
        
        .quiz-question {
            margin-bottom: 20px;
        }
        
        .quiz-options {
            margin: 10px 0;
        }
        
        .quiz-option {
            display: block;
            margin: 5px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
        }
        
        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .quiz-submit {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* 爱心动画 */
        .heart {
            position: fixed;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            transform: rotate(45deg);
            z-index: 9999;
            pointer-events: none;
        }
        
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -10px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 430px) {
            .main-container {
                max-width: 100%;
                padding: 10px;
            }
            
            .cards-container {
                gap: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 主页面 -->
    <div class="main-container">
        <div class="birthday-bg">
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="bell">🔔</div>

            <div class="heart">❤️</div>
            <div class="heart">❤️</div>
            <div class="heart">❤️</div>
            <div class="gift-box">🎁</div>
            <div class="gift-box">🎁</div>

            <div class="party-hat">🎊</div>

            <div class="firework"></div>

            <div class="sparkle"></div>
        </div>
        <h1>生日快乐，我的宝贝</h1>
        <p class="subtitle">每一份礼物都是我对你的爱与牵挂</p>
        
        <div class="cards-container">
            <!-- 生日蛋糕卡片 -->
            <div class="gift-card" data-id="cake">
                <div class="card-content">
                    <div class="card-icon">🎂</div>
                </div>
                <div class="scratch-overlay card1"></div>
                <div class="scratch-area"></div>
            </div>

            <!-- 高跟鞋卡片 -->
            <div class="gift-card" data-id="heels">
                <div class="card-content">
                    <div class="card-icon">👠</div>
                </div>
                <div class="scratch-overlay card2"></div>
                <div class="scratch-area"></div>
            </div>

            <!-- 瑜伽服卡片 -->
            <div class="gift-card" data-id="yoga">
                <div class="card-content">
                    <div class="card-icon">🧘‍♀️</div>
                </div>
                <div class="scratch-overlay card3"></div>
                <div class="scratch-area"></div>
            </div>

            <!-- 舞蹈视频卡片 -->
            <div class="gift-card" data-id="video">
                <div class="card-content">
                    <div class="card-icon">💃</div>
                </div>
                <div class="scratch-overlay card4"></div>
                <div class="scratch-area"></div>
            </div>

            <!-- 防晒口罩卡片 -->
            <div class="gift-card" data-id="mask">
                <div class="card-content">
                    <div class="card-icon">🌞</div>
                </div>
                <div class="scratch-overlay card5"></div>
                <div class="scratch-area"></div>
            </div>

            <!-- 特殊礼物卡片 -->
            <div class="gift-card special-gift" data-id="special">
                <div class="card-content">
                    <div class="card-icon">🎁</div>
                </div>
                <div class="scratch-overlay card6"></div>
                <div class="scratch-area"></div>
                <div class="special-badge">✨</div>
            </div>
        </div>
    </div>

    <!-- 特殊礼物模态框遮罩层 -->
    <div class="modal-overlay" id="specialModalOverlay"></div>

    <!-- 详情页 -->
    <div class="detail-page" id="detailPage">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <div class="detail-content" id="detailContent">
            <!-- 内容将通过JavaScript动态填充 -->
        </div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop autoplay>
        <source src="https://music.163.com/song/media/outer/url?id=186001.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgMusic2" loop autoplay>
        <source src="https://music.163.com/song/media/outer/url?id=18614502.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // 礼物数据
        const gifts = {
            cake: {
                title: "甜蜜生日蛋糕",
                description: "为你定制的专属生日蛋糕，希望它能像我们的爱情一样甜蜜。每一口都充满我的心意，愿你的每一天都如蛋糕般美好。",
                image: "images/cake/0fc52cd3bc5ba767a56497c40c7ea8f5.jpg"
            },
            yoga: {
                title: "Lululemon瑜伽服",
                description: "知道你喜欢运动，特意为你挑选了这套Lululemon瑜伽服。包括Swiftly Tech和Wunder Train系列，它们不仅舒适透气，更能展现你优美的曲线。希望你在运动时能感受到我的陪伴。",
                images: [
                    "images/yoga/swiftly tech.png",
                    "images/yoga/wunder train.png"
                ]
            },
            mask: {
                title: "UV防晒口罩",
                description: "夏天快到了，为你准备了这款UV防晒口罩，保护你娇嫩的肌肤免受紫外线伤害。就像我一直想保护你一样，让你在阳光下也能自信美丽。",
                image: "images/UV protection mask/mask.jpg"
            },
            heels: {
                title: "昂跑 Cloud X4 综训鞋",
                description: "本来是想选择高跟鞋，但最终选择了这双为健身房而生的训练鞋。昂跑Cloud X4，就像我们的爱情一样轻盈又稳固。愿你在每一次撸铁中，都能感受到我为你加油的心。",
                image: "images/shoes/cloud x4.jpg"
            },
            video: {
                title: "专属舞蹈视频",
                description: "这是我为你精心准备的舞蹈视频，每一个动作都承载着我对你的爱，希望你能感受到我的用心。",
                isVideo: true,
                videoUrl: "images/video/637875996.mp4"
            },
            special: {
                title: "甜蜜手指糯米",
                description: "想把你抱进身体里面",
                image: "images/special gift/手指糯米棒.png",
                isSpecial: true
            }
        };
        
        // 刮刮乐功能
        document.querySelectorAll('.scratch-area').forEach(area => {
            const card = area.closest('.gift-card');
            const overlay = card.querySelector('.scratch-overlay');
            let isScratching = false;
            let scratchProgress = 0;

            // 鼠标事件
            area.addEventListener('mousedown', function(e) {
                isScratching = true;
                area.dataset.scratching = 'true';
                scratch(e);
            });

            document.addEventListener('mousemove', function(e) {
                if (isScratching) {
                    scratch(e);
                }
            });

            document.addEventListener('mouseup', function() {
                isScratching = false;
                setTimeout(() => { area.dataset.scratching = 'false'; }, 100);
            });

            // 触摸事件
            area.addEventListener('touchstart', function(e) {
                isScratching = true;
                area.dataset.scratching = 'true';
                scratch(e.touches[0]);
                e.preventDefault();
            });

            area.addEventListener('touchmove', function(e) {
                if (isScratching) {
                    scratch(e.touches[0]);
                    e.preventDefault();
                }
            });

            area.addEventListener('touchend', function() {
                isScratching = false;
                setTimeout(() => { area.dataset.scratching = 'false'; }, 100);
            });

            function scratch(e) {
                const rect = overlay.getBoundingClientRect();
                const x = e.clientX;
                const y = e.clientY;

                // 计算相对于overlay的位置
                const relativeX = x - rect.left;
                const relativeY = y - rect.top;

                // 创建刮开效果 - 使用白色圆形div
                const circle = document.createElement('div');
                circle.style.position = 'absolute';
                circle.style.width = '60px';
                circle.style.height = '60px';
                circle.style.borderRadius = '50%';
                circle.style.backgroundColor = 'rgba(255, 255, 255, 0.95)';
                circle.style.left = (relativeX - 30) + 'px';
                circle.style.top = (relativeY - 30) + 'px';
                circle.style.pointerEvents = 'none';
                circle.style.zIndex = '15';

                overlay.appendChild(circle);

                // 计算刮开进度
                scratchProgress += 0.8;
                if (scratchProgress >= 60) {
                    // 刮开完成，显示卡片内容
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none';

                    // 同时隐藏刮擦区域，确保点击事件能传递到卡片
                    area.style.display = 'none';

                    // 检查是否是特殊礼物卡片
                    if (card.classList.contains('special-gift')) {
                        // 添加金色光晕效果
                        card.classList.add('scratched');
                    }

                    // 所有卡片都添加放大效果
                    card.classList.add('enlarged');

                    // 2秒后移除放大效果
                    setTimeout(() => {
                        card.classList.remove('enlarged');
                    }, 2000);
                }
            }
        });
        // 卡片点击事件
        document.querySelectorAll('.gift-card').forEach(card => {
            const area = card.querySelector('.scratch-area');

            card.addEventListener('click', function(e) {
                // 如果正在刮擦，不触发点击
                if (area.dataset.scratching === 'true') {
                    return;
                }

                const overlay = this.querySelector('.scratch-overlay');
                // 只有当刮开覆盖层后才能点击进入详情
                // 检查opacity是否为0（刮开后的状态）
                if (overlay && overlay.style.opacity !== '0') {
                    return; // 刮开覆盖层之前不允许点击
                }

                const giftId = this.dataset.id;
                showDetail(giftId);
            });
        });
        
        // 显示详情页
        function showDetail(giftId) {
            const gift = gifts[giftId];
            const detailContent = document.getElementById('detailContent');
            
            let content = '';
            if (gift.isVideo) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <div class="video-container">
                        <video controls autoplay style="width: 100%; border-radius: 10px;">
                            <source src="${gift.videoUrl}" type="video/mp4">
                            您的浏览器不支持视频播放
                        </video>
                    </div>
                    <p class="detail-description">${gift.description}</p>
                `;
            } else if (gift.isSpecial) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <img src="${gift.image}" alt="${gift.title}" class="detail-image" style="border-radius: 15px; margin-bottom: 20px;">
                    <p class="detail-description">${gift.description}</p>
                `;
            } else if (gift.images && gift.images.length > 0) {
                // 处理多张图片的情况
                let imageContent = '';
                gift.images.forEach(imgSrc => {
                    imageContent += `<img src="${imgSrc}" alt="${gift.title}" class="detail-image">`;
                });
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    ${imageContent}
                    <p class="detail-description">${gift.description}</p>
                `;
            } else {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <img src="${gift.image}" alt="${gift.title}" class="detail-image">
                    <p class="detail-description">${gift.description}</p>
                `;
            }
            
            detailContent.innerHTML = content;
            document.getElementById('detailPage').style.display = 'block';
        }
        
        // 关闭详情页
        function closeDetail() {
            document.getElementById('detailPage').style.display = 'none';
        }
        
        // 显示密码提示
        // 爱心动画
        document.addEventListener('click', function(e) {
            createHeart(e.clientX, e.clientY);
        });
        
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            
            // 动画
            heart.style.animation = 'heartFloat 3s ease-out forwards';
            
            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes heartFloat {
                0% {
                    transform: rotate(45deg) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: rotate(45deg) scale(0.5) translateY(-100px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // 自动播放音乐
        window.addEventListener('load', function() {
            const music = document.getElementById('bgMusic');
            const music2 = document.getElementById('bgMusic2');
            music.volume = 0.3;
            music2.volume = 0.3;
            // 尝试播放音乐
            music.play().catch(e => {
                console.log('需要用户交互才能播放音乐');
            });
            music2.play().catch(e => {
                console.log('需要用户交互才能播放音乐2');
            });
        });
        
        // 点击页面时播放音乐
        document.addEventListener('click', function() {
            const music = document.getElementById('bgMusic');
            const music2 = document.getElementById('bgMusic2');
            if (music.paused) {
                music.play();
            }
            if (music2.paused) {
                music2.play();
            }
        });
    </script>
</body>
</html>
