<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐，我的宝贝 - 粉色波点版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffecd2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 主页面样式 */
        .main-container {
            max-width: 430px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 8px 32px rgba(255, 154, 158, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #8b008b;
            margin: 40px 0 16px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 154, 158, 0.3);
        }
        
        .subtitle {
            text-align: center;
            color: #c71585;
            margin-bottom: 48px;
            font-size: 16px;
            font-style: italic;
        }
        
        /* 卡片容器 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* 卡片样式 */
        .gift-card {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(139, 0, 139, 0.15);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #fff5f7 0%, #ffe4ec 100%);
            border: 2px solid #ffb6c1;
        }
        
        .gift-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 35px rgba(139, 0, 139, 0.25);
            border-color: #ff69b4;
        }
        
        .card-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card-icon {
            font-size: 68px;
            margin-bottom: 12px;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.15));
            animation: iconFloat 3s ease-in-out infinite;
        }
        
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }
        
        /* 刮刮乐效果 */
        .scratch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#ff69b4 2px, transparent 2px);
            background-size: 20px 20px;
            background-color: #ffb6c1;
            animation: polkaPattern 4s linear infinite;
        }
        
        @keyframes polkaPattern {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }
        
        .scratch-text {
            color: #8b008b;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(139, 0, 139, 0.25);
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            border: 2px dashed #ff69b4;
        }
        
        .scratch-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: crosshair;
        }
        
        /* 详情页样式 */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        
        .detail-content {
            max-width: 430px;
            margin: 0 auto;
            padding: 40px 24px;
            color: white;
            animation: slideUp 0.4s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 36px;
            color: white;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        
        .detail-image {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .detail-title {
            font-size: 28px;
            margin-bottom: 16px;
            color: #ffb6c1;
            text-align: center;
        }
        
        .detail-description {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 24px;
            text-align: center;
            color: #f0f0f0;
        }
        
        /* 进度指示器 */
        .scratch-progress {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #8b008b;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 0, 139, 0.3);
            border: 1px solid #ffb6c1;
        }
        
        .scratch-progress.visible {
            opacity: 1;
            animation: progressPulse 2s ease-in-out infinite;
        }
        
        @keyframes progressPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        /* 响应式设计 */
        @media (max-width: 430px) {
            .main-container {
                max-width: 100%;
                padding: 16px;
            }
            
            .cards-container {
                gap: 16px;
            }
            
            h1 {
                font-size: 26px;
                margin: 30px 0 12px;
            }
            
            .card-icon {
                font-size: 60px;
            }
        }
        
        /* 装饰元素 */
        .decoration-dot {
            position: fixed;
            background: #ff69b4;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: dotFloat 8s ease-in-out infinite;
        }
        
        @keyframes dotFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-30px) scale(1.2);
            }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration-dot" style="top: 10%; left: 5%; width: 20px; height: 20px; animation-delay: 0s;"></div>
    <div class="decoration-dot" style="top: 20%; right: 8%; width: 15px; height: 15px; animation-delay: 1s;"></div>
    <div class="decoration-dot" style="bottom: 30%; left: 3%; width: 25px; height: 25px; animation-delay: 2s;"></div>
    <div class="decoration-dot" style="bottom: 15%; right: 5%; width: 18px; height: 18px; animation-delay: 1.5s;"></div>
    <div class="decoration-dot" style="top: 40%; left: 15%; width: 12px; height: 12px; animation-delay: 0.5s;"></div>
    <div class="decoration-dot" style="bottom: 60%; right: 12%; width: 22px; height: 22px; animation-delay: 2.5s;"></div>

    <!-- 主页面 -->
    <div class="main-container">
        <h1>生日快乐，我的宝贝</h1>
        <p class="subtitle">每一份礼物都是我对你的爱与牵挂</p>
        
        <div class="cards-container">
            <!-- 生日蛋糕卡片 -->
            <div class="gift-card" data-id="cake">
                <div class="card-content">
                    <div class="card-icon">🎂</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
            
            <!-- lululemon瑜伽裤卡片 -->
            <div class="gift-card" data-id="yoga">
                <div class="card-content">
                    <div class="card-icon">🧘‍♀️</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
            
            <!-- 防晒口罩卡片 -->
            <div class="gift-card" data-id="mask">
                <div class="card-content">
                    <div class="card-icon">😷</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
            
            <!-- 高跟鞋卡片 -->
            <div class="gift-card" data-id="heels">
                <div class="card-content">
                    <div class="card-icon">👠</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
            
            <!-- 视频卡片 -->
            <div class="gift-card" data-id="video">
                <div class="card-content">
                    <div class="card-icon">🎬</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
            
            <!-- 爱情quiz卡片 -->
            <div class="gift-card" data-id="quiz">
                <div class="card-content">
                    <div class="card-icon">💕</div>
                </div>
                <div class="scratch-overlay">
                    <span class="scratch-text">🎁 刮开看看</span>
                </div>
                <div class="scratch-area"></div>
                <div class="scratch-progress">0%</div>
            </div>
        </div>
    </div>
    
    <!-- 详情页 -->
    <div class="detail-page" id="detailPage">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <div class="detail-content" id="detailContent">
            <!-- 内容将通过JavaScript动态填充 -->
        </div>
    </div>
    
    <script>
        // 礼物数据
        const gifts = {
            cake: {
                title: "甜蜜生日蛋糕",
                description: "为你定制的专属生日蛋糕，希望它能像我们的爱情一样甜蜜。每一口都充满我的心意，愿你的每一天都如蛋糕般美好。",
                image: "https://picsum.photos/seed/cake/800/600"
            },
            yoga: {
                title: "Lululemon瑜伽裤",
                description: "知道你喜欢运动，特意为你挑选了这条Lululemon瑜伽裤。它不仅舒适透气，更能展现你优美的曲线。希望你在运动时能感受到我的陪伴。",
                image: "https://picsum.photos/seed/yoga/800/600"
            },
            mask: {
                title: "防晒口罩",
                description: "夏天快到了，为你准备了这款防晒口罩，保护你娇嫩的肌肤免受紫外线伤害。就像我一直想保护你一样，让你在阳光下也能自信美丽。",
                image: "https://picsum.photos/seed/mask/800/600"
            },
            heels: {
                title: "优雅高跟鞋",
                description: "这双高跟鞋能让你更加优雅动人，就像你在我心中的样子。每一步都踩在我的心上，愿你穿着它走向更加美好的未来。",
                image: "https://picsum.photos/seed/heels/800/600"
            },
            video: {
                title: "专属视频",
                description: "这是我为你精心制作的视频，记录了我们在一起的美好时光。每一个画面都承载着我对你的爱，希望你能感受到我的用心。",
                isVideo: true,
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            quiz: {
                title: "爱情Quiz",
                description: "来测试一下我们的默契吧！看看你对我了解多少，每一个问题都藏着我对你的爱。",
                isQuiz: true
            }
        };
        
        // 刮刮乐效果
        document.querySelectorAll('.scratch-area').forEach((area, index) => {
            let isScratching = false;
            let scratchedPixels = new Set();
            const overlay = area.parentElement.querySelector('.scratch-overlay');
            const progressEl = area.parentElement.querySelector('.scratch-progress');
            const card = area.parentElement;
            let cardRect = overlay.getBoundingClientRect();
            const cardArea = cardRect.width * cardRect.height;
            const requiredScratchPercentage = 0.9;
            const requiredScratchArea = cardArea * requiredScratchPercentage;
            const scratchRadius = 40;
            
            // 创建刮刮画布
            const canvas = document.createElement('canvas');
            canvas.width = cardRect.width;
            canvas.height = cardRect.height;
            canvas.style.position = 'absolute';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '20';
            canvas.style.cursor = 'crosshair';
            overlay.parentElement.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            
            // 绘制刮刮层
            function drawScratchLayer() {
                // 创建波点图案
                ctx.fillStyle = '#ffb6c1';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 添加波点
                ctx.fillStyle = '#ff69b4';
                for (let i = 0; i < canvas.width; i += 20) {
                    for (let j = 0; j < canvas.height; j += 20) {
                        ctx.beginPath();
                        ctx.arc(i, j, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // 添加文字
                ctx.fillStyle = '#8b008b';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🎁 刮开看看', canvas.width / 2, canvas.height / 2);
            }
            
            drawScratchLayer();
            
            // 刮开函数
            function scratch(x, y) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, scratchRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // 记录刮开的像素
                for (let dx = -scratchRadius; dx <= scratchRadius; dx++) {
                    for (let dy = -scratchRadius; dy <= scratchRadius; dy++) {
                        if (dx * dx + dy * dy <= scratchRadius * scratchRadius) {
                            const px = Math.floor(x + dx);
                            const py = Math.floor(y + dy);
                            if (px >= 0 && px < canvas.width && py >= 0 && py < canvas.height) {
                                scratchedPixels.add(`${px},${py}`);
                            }
                        }
                    }
                }
                
                checkScratchProgress();
            }
            
            function checkScratchProgress() {
                const progress = Math.min(100, Math.floor((scratchedPixels.size / requiredScratchArea) * 100));
                progressEl.textContent = progress + '%';
                progressEl.classList.add('visible');
                
                if (scratchedPixels.size >= requiredScratchArea) {
                    canvas.style.opacity = '0';
                    canvas.style.transition = 'opacity 0.5s ease';
                    progressEl.textContent = '完成！';
                    setTimeout(() => {
                        canvas.style.display = 'none';
                        progressEl.style.display = 'none';
                        overlay.style.display = 'none';
                        card.classList.add('scratched');
                    }, 500);
                }
            }
            
            // 鼠标事件
            canvas.addEventListener('mousedown', function(e) {
                isScratching = true;
                const rect = canvas.getBoundingClientRect();
                scratch(e.clientX - rect.left, e.clientY - rect.top);
            });
            
            document.addEventListener('mousemove', function(e) {
                if (isScratching) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    if (x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
                        scratch(x, y);
                    }
                }
            });
            
            document.addEventListener('mouseup', function() {
                isScratching = false;
            });
            
            // 触摸事件
            canvas.addEventListener('touchstart', function(e) {
                isScratching = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                scratch(touch.clientX - rect.left, touch.clientY - rect.top);
                e.preventDefault();
            });
            
            document.addEventListener('touchmove', function(e) {
                if (isScratching) {
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    if (x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
                        scratch(x, y);
                    }
                    e.preventDefault();
                }
            });
            
            document.addEventListener('touchend', function() {
                isScratching = false;
            });
            
            // 隐藏原始scratch-area
            area.style.display = 'none';
        });
        
        // 卡片点击事件
        document.querySelectorAll('.gift-card').forEach(card => {
            card.addEventListener('click', function() {
                if (!this.classList.contains('scratched')) {
                    return;
                }
                
                const giftId = this.dataset.id;
                showDetail(giftId);
            });
        });
        
        // 显示详情页
        function showDetail(giftId) {
            const gift = gifts[giftId];
            const detailContent = document.getElementById('detailContent');
            
            let content = '';
            if (gift.isVideo) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <div style="position: relative; width: 100%; padding-bottom: 56.25%; margin: 20px 0;">
                        <iframe src="${gift.videoUrl}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 16px;"></iframe>
                    </div>
                    <p class="detail-description">${gift.description}</p>
                `;
            } else if (gift.isQuiz) {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <p class="detail-description">${gift.description}</p>
                    <div style="margin: 30px 0;">
                        <div style="margin-bottom: 20px;">
                            <h3 style="margin-bottom: 10px; color: #ffb6c1;">1. 我最喜欢的颜色是什么？</h3>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <button style="padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; cursor: pointer; text-align: left;">蓝色</button>
                                <button style="padding: 12px; background: rgba(255,182,193,0.3); border: none; border-radius: 8px; color: white; cursor: pointer; text-align: left;">粉色 ✓</button>
                                <button style="padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; cursor: pointer; text-align: left;">绿色</button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                content = `
                    <h2 class="detail-title">${gift.title}</h2>
                    <img src="${gift.image}" alt="${gift.title}" class="detail-image">
                    <p class="detail-description">${gift.description}</p>
                `;
            }
            
            detailContent.innerHTML = content;
            document.getElementById('detailPage').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭详情页
        function closeDetail() {
            document.getElementById('detailPage').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // 点击详情页背景关闭
        document.getElementById('detailPage').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetail();
            }
        });
    </script>
</body>
</html>
